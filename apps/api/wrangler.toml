name = "donggeuri-api"
main = "src/index.ts"
compatibility_date = "2026-03-16"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "donggeuri-blog"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "donggeuri-assets"
preview_bucket_name = "donggeuri-assets-preview"

[vars]
R2_PUBLIC_BASE_URL = ""
ADMIN_EMAIL = ""
ADMIN_PASSWORD_HASH = ""
JWT_SECRET = ""
