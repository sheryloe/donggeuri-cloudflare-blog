name = "cloudflare-blog-api"
main = "src/index.ts"
compatibility_date = "2026-03-16"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "cloudflare-blog"
database_id = "00000000-0000-0000-0000-000000000000"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "cloudflare-blog-assets"
preview_bucket_name = "cloudflare-blog-assets-preview"

[vars]
PUBLIC_APP_ORIGIN = "https://blog.example.com"
ADMIN_APP_ORIGIN = "https://admin.example.com"
R2_PUBLIC_BASE_URL = "https://assets.example.com"
